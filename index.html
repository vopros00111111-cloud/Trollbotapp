<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlessCoin</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ХЕДЕР -->
    <header class="app-header">
        <div class="user-info">
            <div class="avatar-wrapper">
                <img id="header-avatar" src="" alt="" class="avatar">
                <span class="avatar-placeholder">?</span>
            </div>
            <div class="user-details">
                <div id="header-nickname" class="nickname">Загрузка...</div>
                <div class="status">Онлайн</div>
            </div>
        </div>
        <div class="balance-box">
            <span class="balance-label">Баланс:</span>
            <div id="header-balance" class="balance-value">0 💰</div>
        </div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main>
        <!-- ГЛАВНАЯ -->
        <section id="tab-home" class="tab-content active">
            <h1 class="page-title">Главная:</h1>
            
            <div class="main-layout">
                <!-- Левая колонка: Топ -->
                <div class="top-container">
                    <h2 class="top-title">Топ:</h2>
                    <div id="top-list" class="top-list">
                        <div style="text-align:center; padding:20px; color:#888;">Загрузка...</div>
                    </div>
                </div>
                
                <!-- Правая колонка: Кнопки меню -->
                <div class="menu-buttons-container">
                    <button class="menu-btn" onclick="switchTab('games')">🎮 Игры</button>
                    <button class="menu-btn" onclick="switchTab('transfer')">💸 Переводы</button>
                    <button class="menu-btn" onclick="switchTab('profile')">👤 Профиль</button>
                    <button class="menu-btn" onclick="switchTab('catalog')">📦 Каталог</button>
                </div>            </div>
        </section>

        <!-- ИГРЫ -->
        <section id="tab-games" class="tab-content">
            <h1 class="page-title">Игры:</h1>
            <div id="games-list" class="games-grid"></div>
        </section>

        <!-- КАТАЛОГ -->
        <section id="tab-catalog" class="tab-content">
            <h1 class="page-title">Каталог:</h1>
            <div id="catalog-list" class="catalog-grid"></div>
        </section>

        <!-- ПЕРЕВОДЫ -->
        <section id="tab-transfer" class="tab-content">
            <h1 class="page-title">Переводы:</h1>
            <div class="transfer-form">
                <div class="form-group">
                    <label>Получатель (@username):</label>
                    <input type="text" id="transfer-to" placeholder="@username">
                </div>
                <div class="form-group">
                    <label>Сумма:</label>
                    <input type="number" id="transfer-amount" placeholder="100" min="1">
                </div>
                <div class="form-group">
                    <label>Сообщение:</label>
                    <input type="text" id="transfer-comment" placeholder="">
                </div>
                <button class="action-btn" onclick="sendTransfer()">Перевести</button>
            </div>
        </section>

        <!-- ПРОФИЛЬ -->
        <section id="tab-profile" class="tab-content">
            <div class="profile-card">
                <div class="profile-avatar-wrapper">
                    <img id="profile-avatar" src="" alt="" class="profile-avatar">
                    <span class="avatar-placeholder-large">?</span>
                </div>
                <h2 id="profile-nickname" class="profile-name">Загрузка...</h2>
                <div id="profile-balance" class="profile-balance">0 💰</div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-label">Место в топе</span>
                        <span id="stat-rank" class="stat-value">-</span>
                    </div>
                    <div class="stat-item">                        <span class="stat-label">Игр сыграно</span>
                        <span id="stat-games" class="stat-value">-</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Выиграно</span>
                        <span id="stat-won" class="stat-value">-</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- НИЖНЕЕ МЕНЮ -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="home">🏠<span>Главная</span></button>
        <button class="nav-btn" data-tab="games">🎮<span>Игры</span></button>
        <button class="nav-btn" data-tab="catalog">📦<span>Каталог</span></button>
        <button class="nav-btn" data-tab="transfer">💱<span>Переводы</span></button>
        <button class="nav-btn" data-tab="profile">👤<span>Профиль</span></button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
