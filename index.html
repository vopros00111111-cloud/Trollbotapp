<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlessCoin App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ХЕДЕР -->
    <header class="app-header">
        <div class="user-info">
            <img id="header-avatar" src="" alt="" class="avatar">
            <span id="header-nickname">Гость</span>
        </div>
        <div id="header-balance" class="balance">0 💰</div>
    </header>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <main>
        <!-- ГЛАВНАЯ -->
        <section id="tab-home" class="tab-content active">
            <h2 class="section-title">Главная</h2>
            <div class="stats-card">
                <div class="stat-row"><span>🏆 Место:</span> <span id="stat-rank">#-</span></div>
                <div class="stat-row"><span>🎲 Игр:</span> <span id="stat-games">0</span></div>
                <div class="stat-row"><span>💰 Выиграно:</span> <span id="stat-won">0</span></div>
            </div>
            <h3 class="section-title">Топ игроков</h3>
            <div id="top-list" class="top-list"></div>
        </section>

        <!-- ИГРЫ -->
        <section id="tab-games" class="tab-content">
            <h2 class="section-title">Игры</h2>
            <div id="games-list" class="games-grid"></div>
        </section>

        <!-- КАТАЛОГ -->
        <section id="tab-catalog" class="tab-content">
            <h2 class="section-title">Каталог</h2>
            <div id="catalog-list" class="catalog-grid"></div>
        </section>

        <!-- ПЕРЕВОДЫ -->
        <section id="tab-transfer" class="tab-content">
            <h2 class="section-title">Переводы</h2>
            <div class="form-group">                <label>Получатель (@username)</label>
                <input type="text" id="transfer-to" placeholder="@username">
            </div>
            <div class="form-group">
                <label>Сумма</label>
                <input type="number" id="transfer-amount" placeholder="100" min="1">
            </div>
            <div class="form-group">
                <label>Комментарий</label>
                <input type="text" id="transfer-comment" placeholder="Необязательно">
            </div>
            <button class="action-btn" onclick="sendTransfer()">Отправить перевод</button>
        </section>

        <!-- ПРОФИЛЬ -->
        <section id="tab-profile" class="tab-content">
            <h2 class="section-title">Профиль</h2>
            <div class="profile-card">
                <img id="profile-avatar" src="" alt="" class="avatar-large">
                <h3 id="profile-nickname">Гость</h3>
                <div class="profile-balance" id="profile-balance">0 💰</div>
            </div>
        </section>

        <!-- ==================== ИГРОВЫЕ СЕКЦИИ ==================== -->

        <!-- БЛЭКДЖЕК -->
        <section id="game-blackjack" class="game-section">
            <div class="game-header">
                <button class="back-btn" onclick="closeGame('blackjack')">← Назад</button>
                <h2>🃏 Блэкджек</h2>
            </div>
            <div class="bj-table">
                <div class="hand-area">
                    <div class="hand-label">Дилер: <span id="dealer-score">0</span></div>
                    <div id="dealer-cards" class="cards-row"></div>
                </div>
                <div class="hand-area">
                    <div class="hand-label">Вы: <span id="player-score">0</span></div>
                    <div id="player-cards" class="cards-row"></div>
                </div>
            </div>
            <div id="bet-controls" class="game-controls">
                <input type="number" id="bj-bet" placeholder="Ставка (мин. 10)" min="10">
                <button class="action-btn" onclick="startBlackjack()">Раздать карты</button>
            </div>
            <div id="play-controls" class="game-controls" style="display:none;">
                <button class="action-btn hit-btn" onclick="hit()">👆 Ещё</button>
                <button class="action-btn stand-btn" onclick="stand()">✋ Хватит</button>
            </div>            <div id="bj-message" class="game-message"></div>
        </section>

        <!-- СЛОТЫ -->
        <section id="game-slots" class="game-section">
            <div class="game-header">
                <button class="back-btn" onclick="closeGame('slots')">← Назад</button>
                <h2>🎰 Слоты</h2>
            </div>
            <div class="slots-machine">
                <div id="reel1" class="reel">🍒</div>
                <div id="reel2" class="reel">🍒</div>
                <div id="reel3" class="reel">🍒</div>
            </div>
            <div class="game-controls">
                <input type="number" id="slots-bet" placeholder="Ставка (мин. 10)" min="10">
                <button class="action-btn" onclick="spinSlots()">🎰 Крутить</button>
            </div>
            <div id="slots-message" class="game-message"></div>
        </section>

        <!-- РУЛЕТКА -->
        <section id="game-roulette" class="game-section">
            <div class="game-header">
                <button class="back-btn" onclick="closeGame('roulette')">← Назад</button>
                <h2>🎡 Рулетка</h2>
            </div>
            <div class="roulette-container">
                <div class="roulette-wheel" id="roulette-wheel">
                    <div class="wheel-center">
                        <div class="wheel-number" id="roulette-result">?</div>
                    </div>
                </div>
            </div>
            <div class="game-controls">
                <input type="number" id="roulette-bet" placeholder="Ставка (мин. 10)" min="10">
                <div class="bet-buttons">
                    <button class="bet-btn red" onclick="placeRouletteBet('red')">🔴 x2</button>
                    <button class="bet-btn black" onclick="placeRouletteBet('black')">⚫ x2</button>
                    <button class="bet-btn green" onclick="placeRouletteBet('green')">🟢 x14</button>
                </div>
                <div class="number-bet">
                    <input type="number" id="roulette-number" placeholder="Число 0-36" min="0" max="36">
                    <button class="action-btn" onclick="placeRouletteBet('number')">Число x36</button>
                </div>
            </div>
            <div id="roulette-message" class="game-message"></div>
        </section>

        <!-- ПОКЕР -->        <section id="game-poker" class="game-section">
            <div class="game-header">
                <button class="back-btn" onclick="closeGame('poker')">← Назад</button>
                <h2>🃏 Покер</h2>
            </div>
            <div id="poker-lobby">
                <div class="form-group">
                    <label>Ставка:</label>
                    <input type="number" id="poker-bet" placeholder="Минимум 100" min="100">
                </div>
                <div class="form-group">
                    <label>Игроков (2-4):</label>
                    <select id="poker-players">
                        <option value="2">2 игрока</option>
                        <option value="3">3 игрока</option>
                        <option value="4">4 игрока</option>
                    </select>
                </div>
                <button class="action-btn" onclick="createPokerTable()">Создать стол</button>
            </div>
            <div id="poker-game" style="display:none;">
                <div class="poker-table">
                    <div class="community-cards" id="community-cards"></div>
                    <div class="pot-info">Банк: <span id="poker-pot">0</span></div>
                    <div class="player-hand" id="player-hand"></div>
                </div>
                <div class="poker-controls" id="poker-controls"></div>
            </div>
            <div id="poker-message" class="game-message"></div>
        </section>
    </main>

    <!-- МОДАЛЬНОЕ ОКНО (Дурак) -->
    <div id="modal-create-table" class="modal">
        <div class="modal-content">
            <h3>Создать игровой стол</h3>
            <div class="form-group">
                <label>Количество игроков:</label>
                <select id="table-players">
                    <option value="2">2 игрока</option>
                    <option value="3">3 игрока</option>
                    <option value="4">4 игрока</option>
                </select>
            </div>
            <div class="form-group">
                <label>Ставка (монет):</label>
                <input type="number" id="table-bet" placeholder="Минимум 100" min="100">
            </div>
            <div class="modal-buttons">
                <button class="action-btn cancel" onclick="closeModal()">Отмена</button>
                <button class="action-btn confirm" onclick="confirmCreateTable()">Создать</button>
            </div>
        </div>
    </div>

    <!-- НИЖНЕЕ МЕНЮ -->
    <nav class="bottom-nav">
        <button class="nav-btn active" data-tab="home">🏠<span>Главная</span></button>
        <button class="nav-btn" data-tab="games">🎮<span>Игры</span></button>
        <button class="nav-btn" data-tab="catalog">📦<span>Каталог</span></button>
        <button class="nav-btn" data-tab="transfer">💱<span>Переводы</span></button>
        <button class="nav-btn" data-tab="profile">👤<span>Профиль</span></button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
